url: http://animovement.dev/animovement/

home:
  title: Analyse movement across space and time

# Theme, author details, and the shared navbar components (the animovement
# ecosystem dropdown + Zulip link) are inherited from animovementtemplate.
# The Tutorial/Articles menus and the navbar layout below are specific to
# this umbrella site.
template:
  bootstrap: 5
  package: animovementtemplate

reference:
- title: "animovement"
  desc: These functions allow you to manage your animovement packages.
  contents:
  - animovement_detach
  - animovement_extend
  - animovement_conflicts
  - animovement_deps
  - animovement_update
  - animovement_install
  - animovement_sitrep
  - animovement_packages
  - animovement_install_suggested
  - animovement_show_suggested


navbar:
  components:
    tutorial:
      text: Tutorial
      menu:
      - text: Read trackball data
        href: articles/read-trackball.html
      - text: Clean tracks
        href: articles/clean-tracks.html
      - text: Calculate kinematics
        href: articles/calculate-kinematics.html
      - text: Calculate summary statistics
        href: articles/calculate-summary-statistics.html
    articles:
      text: Articles
      menu:
      - text: Mission & Scope
        href: articles/mission.html
      - text: Roadmaps
      - text: How to contribute
  structure:
    left:  [intro, tutorial, articles, reference, news]
    right: [search, animovement, zulip, github, lightswitch]

